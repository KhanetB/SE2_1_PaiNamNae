[General]
# Robot Framework configuration for TS-F04 test suite

# Output directory for test results
outdir=results

# Report and log file names
report=report.html
log=log.html

# Timeout for individual keywords
timeout=30s

# Retry failed tests
retryfailed=1

# Log level (DEBUG, INFO, WARN, ERROR)
loglevel=INFO

# Screenshot on failure (for SeleniumLibrary)
screenshotonsuccess=True

# Parallel execution settings (if using pabot)
# -processes=4

# Tags
# include=critical
# exclude=known-issue

# Documentation
doc=Admin Log Viewing Test Suite (TS-F04)
