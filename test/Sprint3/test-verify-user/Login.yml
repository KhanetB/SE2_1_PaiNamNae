info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/api/auth/login
  body:
    type: json
    data: |-
      {
        "email":"verify_test@gmail.com",
        "password":"123456789"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        bru.setEnvVar("token",body.data.token)
    - type: tests
      code: |-
        test("get HTTP 200", function(){
          const status = res.getStatus();
          expect(status).to.equal(200)
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
