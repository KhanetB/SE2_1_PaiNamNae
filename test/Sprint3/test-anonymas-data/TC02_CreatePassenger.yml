info:
  name: TC02_CreatePassenger
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:3000/api/users
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: multipart/form-data
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: "{{passenger_email}}"
      - name: username
        type: text
        value: TestUser
      - name: password
        type: text
        value: "{{passenger_password}}"
      - name: firstName
        type: text
        value: Test
      - name: lastName
        type: text
        value: User
      - name: phoneNumber
        type: text
        value: "08123456789"
      - name: gender
        type: text
        value: MALE
      - name: nationalIdNumber
        type: text
        value: "3456789123456"
      - name: nationalIdExpiryDate
        type: text
        value: 2030-12-31T00:00:00.000Z
      - name: nationalIdPhotoUrl
        type: file
        value:
          - person.jpg
        contentType: image/jpeg
      - name: selfiePhotoUrl
        type: file
        value:
          - person.jpg
        contentType: image/jpeg
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("resposne status should return 201 Created", function(){
          const status = res.getStatus()
          console.log(res.getBody())
          const expectedStatus = 201
          expect(status).to.equal(expectedStatus);
          if (status !== expectedStatus){
            bru.runner.stopExecution();
          }
        });

        // bru.setNextRequest("TC03_Login");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
