info:
  name: TC10_GetDriverBooking
  type: http
  seq: 13

http:
  method: GET
  url: http://localhost:3000/api/bookings/{{booking_id}}
  headers:
    - name: Authorization
      value: Bearer {{driver_token}}
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("get HTTP 200",function(){
          const status = res.getStatus();
          expect(status).to.equal(200);
        })

        test("is user anonymized",function(){
          const body = res.getBody();
          var passengerEmail = bru.getEnvVar("passenger_email");
          expect(body.data).to.not.equal(null);
          expect(body.data.passenger.id).to.equal("deleted");
          expect(body.data.passenger.email).to.not.equal(passengerEmail);
          expect(body.data.passenger.isAnonymized).to.equal(true)
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
