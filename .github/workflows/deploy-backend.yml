name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths: 
      - 'code/backend/**'

env:
  REGISTRY: ghcr.io
  # ตรงนี้เป็นตัวพิมพ์ใหญ่ตามชื่อ Repo (ห้ามแก้เพราะ GitHub ใช้ระบุตัวตน)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: 
      contents: read 
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Image Name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: ./code/backend
          push: true
          # ใช้ตัวพิมพ์เล็กที่แปลงแล้ว
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase Image Name
        run: |
          # แปลงเป็นตัวเล็กเก็บไว้ใช้ใน Job นี้
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create .env file 
        run: |
          # เขียนค่าจาก Secret ลงไฟล์ก่อน
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "PORT=3000" >> .env
          echo "NODE_ENV=production" >> .env
          # ใส่ชื่อ Image ตัวเล็กลงในไฟล์ .env
          echo "IMAGE_NAME=${{ env.IMAGE_NAME_LOWER }}" >> .env

      - name: Pull and Restart
        # บรรทัดสำคัญ: บังคับให้ docker compose เห็น IMAGE_NAME เป็นตัวพิมพ์เล็ก
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME_LOWER }}
        run: |
          docker compose pull
          docker compose up -d
          docker image prune -f
